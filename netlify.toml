# AI Farm / AquaCool — deploy from repository root (Dashboard: base directory empty, or use this file only).

[build]
  command = "bash scripts/netlify-build.sh"
  publish = "aquacool-web/dist"

[build.environment]
  NODE_VERSION = "20"
  # Flask API host (no trailing slash). Used to generate the /api/* proxy in _redirects.
  BACKEND_ORIGIN = "https://ai-farm-water-hackathon.onrender.com"
  # Simulator fetch() base inside the static demo (same-origin /api when proxy is enabled).
  REACT_APP_API_URL = "/api"
